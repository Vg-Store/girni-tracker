<!DOCTYPE html>

<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>गिरणी नोंद</title>

<meta name="theme-color" content="#2e7d32">
<meta name="description" content="Daily flour mill KG entry, billing and expense tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/icon-192.png">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

<!-- KG Trend chart is hand-drawn on <canvas> in charts.js —
     no external chart library needed, keeps the app offline-safe -->

</head>

<body>

<header class="app-header">


<div class="brand">

    <img
        src="assets/logo.png"
        alt="Girni Nond"
        class="logo"
    >

    <h1 data-i18n="appTitle">गिरणी नोंद</h1>

</div>

<div class="header-actions">

    <select id="languageToggle">
        <option value="mr">मराठी</option>
        <option value="en">English</option>
    </select>

    <button
        id="themeToggle"
        class="theme-btn"
        title="Theme"
    >
        🌙
    </button>

</div>


</header>

<div id="offlineIndicator" class="offline hidden" data-i18n="offline">
    Offline Mode
</div>

<main>


<!-- DAILY ENTRY -->

<section class="card-section">

    <div class="section-title" data-i18n="dailyEntry">
        Daily Entry
    </div>

    <form id="entryForm">

        <label for="entryKg" data-i18n="totalKg">
            Total KG
        </label>

        <input
            type="number"
            id="entryKg"
            min="0"
            step="0.1"
            inputmode="decimal"
            required
        >

        <label for="entryDate" data-i18n="date">
            Date
        </label>

        <input
            type="date"
            id="entryDate"
            required
        >

        <div class="button-row">

            <button
                type="submit"
                id="saveBtn"
                data-i18n="saveEntry"
            >
                Save Entry
            </button>

            <button
                type="button"
                id="undoBtn"
                data-i18n="undoLast"
            >
                Undo Last
            </button>

        </div>

    </form>

</section>

<!-- RECORDS -->

<details open class="card-section">

    <summary data-i18n="records">
        Records
    </summary>

    <div id="recordsContainer">

        <div class="empty-state" data-i18n="noRecords">

            No records yet

        </div>

    </div>

</details>

<!-- KG TREND -->

<details class="card-section" id="chartDetails">

    <summary data-i18n="kgTrend">
        KG Trend
    </summary>

    <div class="chart-container">

        <canvas id="dailyChart"></canvas>

    </div>

</details>

<!-- BILLING REPORT -->

<details class="card-section">

    <summary data-i18n="billingReports">
        Billing Reports
    </summary>

    <div class="report-container">

        <div class="report-row">

            <span data-i18n="period">Period</span>

            <strong id="reportPeriod">
                -
            </strong>

        </div>

        <div class="report-row">

            <span data-i18n="totalDays">Total Days</span>

            <strong id="reportDays">
                0
            </strong>

        </div>

        <div class="report-row">

            <span data-i18n="totalKgLabel">Total KG</span>

            <strong id="reportKg">
                0
            </strong>

        </div>

        <div class="report-row">

            <span data-i18n="revenue">Revenue</span>

            <strong id="reportRevenue">
                ₹0
            </strong>

        </div>

        <hr>

        <label data-i18n="electricityBill">
            Electricity Bill
        </label>

        <input
            type="number"
            id="electricityBill"
            min="0"
        >

        <label data-i18n="otherExpenses">
            Other Expenses
        </label>

        <input
            type="number"
            id="otherExpenses"
            min="0"
        >

        <button id="saveExpenses" data-i18n="saveExpenses">
            Save Expenses
        </button>

        <div class="net-income-card">

            <div class="net-label" data-i18n="netIncome">

                Net Income

            </div>

            <div id="reportNetIncome"
                 class="net-value">

                ₹0

            </div>

        </div>

    </div>

</details>

<!-- SETTINGS -->

<details class="card-section">

    <summary data-i18n="settings">
        Settings
    </summary>

    <div class="settings-container">

        <label for="ratePerKg" data-i18n="ratePerKg">
            Rate per KG (₹)
        </label>

        <input
            type="number"
            id="ratePerKg"
            min="0"
            step="0.1"
        >

        <label for="billingStartDate" data-i18n="billingStart">
            Billing Start Date
        </label>

        <input
            type="date"
            id="billingStartDate"
        >

        <label for="billingEndDate" data-i18n="billingEnd">
            Billing End Date
        </label>

        <input
            type="date"
            id="billingEndDate"
        >

        <div class="setting-info">

            <span data-i18n="lastBackup">Last Backup:</span>
            <span id="lastBackupDate">
                Never
            </span>

        </div>

        <button id="backupNowBtn" data-i18n="backupNow">
            Backup Now
        </button>

        <button id="exportCsvBtn" data-i18n="exportCsv">
            Export CSV
        </button>

        <button id="exportJsonBtn" data-i18n="exportJson">
            Export JSON
        </button>

        <input
            type="file"
            id="importFile"
            accept=".csv,.json"
        >

        <button id="importBtn" data-i18n="importData">
            Import Data
        </button>

    </div>

</details>


</main>

<div id="toast"></div>

<script src="translations.js"></script>

<script src="db.js"></script>

<script src="billing.js"></script>

<script src="charts.js"></script>

<script src="app.js"></script>

</body>
</html>
